<svg viewBox="0 0 64 64" width="64" height="64" xmlns="http://www.w3.org/2000/svg">
  <!-- fondo negro redondeado -->
  <rect x="0" y="0" width="64" height="64" rx="12" fill="#111110"/>
  <!-- cuerpo claqueta -->
  <rect x="8" y="30" width="48" height="28" rx="4" fill="#1a1a18" stroke="#b08d57" stroke-width="1.2"/>
  <!-- líneas internas cuerpo -->
  <line x1="8" y1="39" x2="56" y2="39" stroke="#3a3a36" stroke-width="0.8"/>
  <!-- parte superior claqueta -->
  <rect x="8" y="7" width="48" height="19" rx="4" fill="#1a1a18" stroke="#b08d57" stroke-width="1.2"/>
  <!-- rayas diagonales claqueta superior -->
  <clipPath id="cc">
    <rect x="8" y="7" width="48" height="19" rx="4"/>
  </clipPath>
  <g clip-path="url(#cc)">
    <polygon points="-4,7 10,7 2,26 -12,26" fill="#b08d57" opacity="0.55"/>
    <polygon points="10,7 22,7 14,26 2,26" fill="#111110" opacity="0.9"/>
    <polygon points="22,7 34,7 26,26 14,26" fill="#b08d57" opacity="0.55"/>
    <polygon points="34,7 46,7 38,26 26,26" fill="#111110" opacity="0.9"/>
    <polygon points="46,7 60,7 52,26 40,26" fill="#b08d57" opacity="0.55"/>
  </g>
  <!-- PV centrado -->
  <text x="32" y="50" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#b08d57" text-anchor="middle" dominant-baseline="middle" letter-spacing="1">PV</text>
</svg>
